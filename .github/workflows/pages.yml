# Déploie le contenu de ce dossier sur GitHub Pages à chaque push sur `main`.
# Ce workflow suppose que l'app est à la RACINE du repo (voir README, étape de
# séparation). Une fois le repo dédié créé et Pages activé (Settings > Pages >
# Source: GitHub Actions), chaque push publie le site.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .            # racine du repo = l'app
      - id: deployment
        uses: actions/deploy-pages@v4
